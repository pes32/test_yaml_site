# Синтаксис файла gui.yaml
# Файл описывает структуру пользовательского интерфейса страницы

# Вкладки страницы
# tabs: [ { name, content: [sections...] } ]

# Секция вкладки
# - name: "Название секции"
#   collapsible: true  # (опционально) по умолчанию true. Если false — секция статична и не сворачивается
#   rows:
#     - widgets: [a, b]
#     - columns:
#         - widgets: [c]
#         - widgets: [d, e]
#     - "Произвольный текст"

# Метаданные страницы (обязательно)
page_metadata:
  url: "/путь/к/странице"      # URL страницы
  title: "Заголовок страницы"   # Заголовок страницы
  description: "Описание"       # Описание страницы

# Структура интерфейса
interface_structure:
  tabs:                         # Массив вкладок
    - name: "Название вкладки"
      content:                  # Содержимое вкладки
        - name: "Название блока"
          rows:                 # Строки блока
            - widgets: ["виджет1", "виджет2"]
            - "Информационный текст"
            - columns:          # Колонки
                - widgets: ["виджет3", "виджет4"]
                - widgets: ["виджет5", "виджет6"]

# Структура вкладки (tab)
tab_structure:
  tabs:
    - name: "Название вкладки"    # Обязательно
      content:                     # Обязательно - массив блоков
        - name: "Блок 1"
          rows: ["строка1", "строка2"]
        - name: "Блок 2"
          rows: ["строка3", "строка4"]

# Структура блока (content)
content_structure:
  content:
    - name: "Название блока"      # Обязательно
      rows:                       # Обязательно - массив строк
        - widgets: ["виджет1", "виджет2"]
        - "Информационный текст"
        - columns: ["колонка1", "колонка2"]

# Типы строк (rows)

# 1. Строка с виджетами
widgets_row_example:
  rows:
    - widgets: ["виджет1", "виджет2", "виджет3"]

# 2. Строка с текстом
text_row_example:
  rows:
    - "Это информационный текст"

# 3. Строка с колонками
columns_row_example:
  rows:
    - columns:
        - widgets: ["виджет1", "виджет2"]
        - widgets: ["виджет3", "виджет4"]
        - widgets: ["виджет5"]

# Структура колонок (columns)
columns_structure:
  columns:
    - widgets: ["виджет1", "виджет2"]    # Первая колонка
    - widgets: ["виджет3", "виджет4"]    # Вторая колонка
    - widgets: ["виджет5"]               # Третья колонка

# Полный пример структуры
complete_structure_example:
  # GUI для страницы
  url: "/page/example"
  title: "Пример страницы"
  description: "Демонстрация различных элементов интерфейса"
  
  tabs:
    - name: "Первая вкладка"
      content:
        - name: "Информационный блок"
          rows:
            - "Добро пожаловать на страницу!"
            - widgets: ["заголовок", "описание"]
        
        - name: "Формы"
          rows:
            - widgets: ["имя", "фамилия"]
            - widgets: ["email", "телефон"]
            - columns:
                - widgets: ["кнопка_сохранить"]
                - widgets: ["кнопка_отмена"]
    
    - name: "Вторая вкладка"
      content:
        - name: "Таблица данных"
          rows:
            - widgets: ["таблица_пользователей"]
            - widgets: ["кнопка_добавить", "кнопка_удалить"]

# Правила размещения виджетов

# 1. Виджеты в строке
widgets_in_row_example:
  rows:
    - widgets: ["виджет1", "виджет2", "виджет3"]  # Все виджеты в одной строке

# 2. Виджеты в колонках
widgets_in_columns_example:
  rows:
    - columns:
        - widgets: ["виджет1", "виджет2"]        # Первая колонка
        - widgets: ["виджет3", "виджет4"]        # Вторая колонка

# 3. Смешанное размещение
mixed_layout_example:
  rows:
    - widgets: ["виджет1", "виджет2"]            # Строка с виджетами
    - "Разделитель"                                # Текстовый разделитель
    - columns:                                     # Строка с колонками
        - widgets: ["виджет3"]
        - widgets: ["виджет4", "виджет5"]

# Специальные элементы

# Текстовый контент
text_content_example:
  rows:
    - "Это информационный текст"
    - "Можно использовать для заголовков, описаний, подсказок"

# Пустые строки
empty_rows_example:
  rows:
    - widgets: ["виджет1"]
    - {}  # Пустая строка для разделения
    - widgets: ["виджет2"]

# Вложенность и группировка

# Группировка виджетов
widget_grouping_example:
  content:
    - name: "Основная информация"
      rows:
        - widgets: ["заголовок", "описание"]
    
    - name: "Дополнительные настройки"
      rows:
        - widgets: ["настройка1", "настройка2"]
        - columns:
            - widgets: ["кнопка_применить"]
            - widgets: ["кнопка_сброс"]

# Многоуровневая структура
multilevel_structure_example:
  tabs:
    - name: "Сложная структура"
      content:
        - name: "Блок 1"
          rows:
            - widgets: ["виджет1"]
            - columns:
                - widgets: ["виджет2", "виджет3"]
                - widgets: ["виджет4"]
        - name: "Блок 2"
          rows:
            - widgets: ["виджет5", "виджет6"]

# Примеры реальных страниц

# Главная страница
main_page_example:
  url: "/"
  title: "Главная страница"
  description: "Системные команды и настройки"
  
  tabs:
    - name: "Системные команды"
      content:
        - name: "Дата и время"
          rows:
            - widgets: ["date_time", "request_date_time", "set_date_time"]
            - widgets: ["timezone", "request_timezone", "set_timezone"]
        
        - name: "Изоляция ядер"
          rows:
            - columns:
                - widgets: ["first_cpu", "last_cpu"]
                - widgets: ["total_logical_cpu", "total_physical_cpu", "get_cpu_qty_button"]
        
        - name: "Системные команды"
          rows:
            - widgets: ["reboot_host", "shutdown_host"]

# Тестовая страница
test_page_example:
  url: "/page/page_2"
  title: "Тестовая страница"
  description: "Демонстрация различных виджетов"
  
  tabs:
    - name: "Тестовая вкладка"
      content:
        - name: "Простые виджеты"
          rows:
            - widgets: ["test_string", "test_number"]
            - widgets: ["test_button", "test_list"]
            - widgets: ["test_ip", "test_datetime"]
    
    - name: "Вторая вкладка"
      content:
        - name: "Сложные виджеты"
          rows:
            - widgets: ["test_table"]
            - columns:
                - widgets: ["test_multiselect"]
                - widgets: ["test_readonly"]

# Рекомендации по структурированию

# 1. Логическая группировка
grouping_recommendations:
  - "Группируйте связанные виджеты в одном блоке"
  - "Используйте понятные названия для блоков и вкладок"
  - "Разделяйте функциональность по вкладкам"

# 2. Оптимальное размещение
placement_recommendations:
  - "Размещайте важные элементы в верхней части"
  - "Используйте колонки для экономии места"
  - "Добавляйте текстовые разделители для читаемости"

# 3. Навигация
navigation_recommendations:
  - "Обеспечивайте логичный переход между страницами"
  - "Используйте кнопки с URL для навигации"
  - "Добавляйте кнопки 'Назад' и 'Домой'"

# 4. Адаптивность
responsiveness_recommendations:
  - "Учитывайте различные размеры экранов"
  - "Используйте колонки для мобильных устройств"
  - "Тестируйте на разных разрешениях"

# Шаблоны для часто используемых структур

# Простая форма
simple_form_template:
  content:
    - name: "Форма"
      rows:
        - widgets: ["поле1", "поле2"]
        - widgets: ["поле3", "поле4"]
        - widgets: ["кнопка_сохранить", "кнопка_отмена"]

# Таблица с действиями
table_with_actions_template:
  content:
    - name: "Данные"
      rows:
        - widgets: ["таблица"]
        - widgets: ["кнопка_добавить", "кнопка_редактировать", "кнопка_удалить"]

# Информационная панель
info_panel_template:
  content:
    - name: "Информация"
      rows:
        - "Заголовок информационной панели"
        - widgets: ["статус", "время_обновления"]
        - widgets: ["кнопка_обновить"]