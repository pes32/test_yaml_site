<!DOCTYPE html>
<html lang="ru">
<head>
    {% set debug_bundle = vite_entry_assets('src/entry/debug.ts') %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug</title>
    <link rel="icon" href="{{ url_for('favicon') }}">
    {% if debug_bundle and debug_bundle.get('css') %}
        {% for css_file in debug_bundle.get('css', []) %}
    <link href="{{ url_for('static', filename='dist/' ~ css_file) }}" rel="stylesheet">
        {% endfor %}
    {% endif %}
</head>
<body>
    <header class="page-header">
        <span class="page-header-brand">Debug</span>
        <a class="page-header-link" href="/">← Вернуться в приложение</a>
    </header>

    <div id="debugApp"></div>
    {% if debug_bundle %}
    <script type="module" src="{{ url_for('static', filename='dist/' ~ debug_bundle['file']) }}"></script>
    {% endif %}
</body>
</html>
