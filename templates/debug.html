<!DOCTYPE html>
<html lang="ru">
{% from "_html_head.html" import app_head %}
{% set debug_bundle = vite_entry_assets('src/entry/debug.ts') %}
{{ app_head('Debug', debug_bundle) }}
<body>
    <header class="page-header">
        <span class="page-header-brand">Debug</span>
        <a class="page-header-link" href="/">← Вернуться в приложение</a>

    <div id="debugApp"></div>
    {% if debug_bundle %}

    {% endif %}
</body>
</html>
