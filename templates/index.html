<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LowCode System - Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Навигация -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <i class="fas fa-code"></i> LowCode System
                </a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/debug" target="_blank">
                        <i class="fas fa-bug"></i> Debug
                    </a>
                </div>
            </div>
        </nav>

        <!-- Основной контент -->
        <div class="container-fluid mt-3">
            <div class="row">
                <div class="col-12">
                    <h1 class="mb-4">
                        <i class="fas fa-home"></i> Доступные страницы
                    </h1>
                    
                    <div v-if="loading" class="text-center">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Загрузка...</span>
                        </div>
                        <p class="mt-2">Загрузка страниц...</p>
                    </div>
                    
                    <div v-else-if="error" class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i> {{ error }}
                    </div>
                    
                    <div v-else class="row">
                        <div v-for="page in pages" :key="page.name" class="col-md-6 col-lg-4 mb-4">
                            <div class="card h-100">
                                <div class="card-body">
                                                        <h5 class="card-title">
                        <i class="fas fa-file-alt"></i> <span v-text="page.title || page.name"></span>
                    </h5>
                    <p v-if="page.description" class="card-text"><span v-text="page.description"></span></p>
                    <p v-else class="card-text text-muted">Страница <span v-text="page.name"></span></p>
                                </div>
                                <div class="card-footer">
                                    <a :href="'/page/' + page.name" class="btn btn-primary">
                                        <i class="fas fa-external-link-alt"></i> Открыть
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div v-if="pages.length === 0" class="text-center">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i> Нет доступных страниц
                        </div>
                        <p>Создайте папки в директории <code>pages/</code> с файлами <code>attrs.yaml</code> и <code>gui.yaml</code></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
