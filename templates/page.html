<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>YAML System - {{ page_config.title if page_config.title else (page_config.name if page_config.name else 'main') }}</title>
    <link href="{{ url_for('static', filename='css/vendor/bootstrap.min.css') }}?v={{ ASSETS_VERSION }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/vendor/font-awesome.min.css') }}?v={{ ASSETS_VERSION }}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="{{ url_for('static', filename='css/style.css') }}?v={{ ASSETS_VERSION }}" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Глобальный модальный менеджер -->
        <modal-manager ref="modalManager"></modal-manager>
        
        <!-- Навигация -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <i class="fas fa-code"></i> YAML System
                </a>
                <div class="navbar-nav me-auto">
                    <span class="navbar-text">
                        <i class="fas fa-file-alt"></i> {{ page_config.title if page_config.title else (page_config.name if page_config.name else 'main') }}
                    </span>
                </div>
                <div class="navbar-nav">
                    <a class="nav-link" href="/debug" target="_blank">
                        <i class="fas fa-bug"></i> Debug
                    </a>
                </div>
            </div>
        </nav>

        <!-- Основной контент -->
        <div class="container-fluid mt-3">
            <div class="page-shell">
                <aside v-if="menus.length" class="page-sidebar">
                    <div class="menu-list page-menu-rail">
                        <button type="button"
                                class="menu-card"
                                :class="{ active: index === activeMenuIndex }"
                                v-for="(menu, index) in menus"
                                :key="index"
                                @click="onMenuClick(index)">
                            <span class="menu-card-icon-shell">
                                <span v-if="menu.icon" class="page-item-icon">
                                    <img v-if="!isFontIcon(menu.icon)"
                                         :src="getIconSrc(menu.icon)"
                                         alt=""
                                         @error="onIconError">
                                    <i v-else :class="menu.icon"></i>
                                </span>
                            </span>
                            <span class="menu-card-label" v-text="menu.name || ('Меню ' + (index + 1))"></span>
                        </button>
                    </div>
                </aside>

                <main class="page-content-column">
                    <div v-if="activeMenu">
                        <ul v-if="activeTabs.length > 1" class="nav nav-tabs page-tabs" id="mainTabs" role="tablist">
                            <li class="nav-item" v-for="(tab, index) in activeTabs" :key="index">
                                <a class="nav-link"
                                   :class="{ active: index === activeTabIndex }"
                                   href="#"
                                   role="tab"
                                   @click.prevent="onTabClick(index)">
                                    <span v-if="tab.icon" class="page-item-icon">
                                        <img v-if="!isFontIcon(tab.icon)"
                                             :src="getIconSrc(tab.icon)"
                                             alt=""
                                             @error="onIconError">
                                        <i v-else :class="tab.icon"></i>
                                    </span>
                                    <span class="page-tab-label" v-text="tab.name || ('Вкладка ' + (index + 1))"></span>
                                </a>
                            </li>
                        </ul>

                        <div class="tab-content page-tab-content" id="mainTabContent">
                            <div class="tab-pane active show">
                                <div v-for="(section, sidx) in activeSections" :key="sidx" class="page-section">
                                    <div class="card page-section-card">
                                        <div v-if="section.showHeader"
                                             class="card-header page-section-header"
                                             :id="'heading-' + activeMenuIndex + '-' + sidx"
                                             :data-bs-toggle="section.collapsible ? 'collapse' : null"
                                             :data-bs-target="section.collapsible ? ('#' + getSectionCollapseId(sidx)) : null"
                                             :style="section.collapsible ? 'cursor: pointer;' : ''">
                                            <h5 class="mb-0 d-flex align-items-center page-section-title">
                                                <span class="page-section-arrow-slot">
                                                    <i v-if="section.collapsible" class="fas fa-chevron-down collapse-icon"></i>
                                                </span>
                                                <span v-if="section.icon" class="page-item-icon">
                                                    <img v-if="!isFontIcon(section.icon)"
                                                         :src="getIconSrc(section.icon)"
                                                         alt=""
                                                         @error="onIconError">
                                                    <i v-else :class="section.icon"></i>
                                                </span>
                                                <span v-text="section.name"></span>
                                            </h5>
                                        </div>

                                        <div :class="section.collapsible ? 'collapse show' : ''"
                                             :id="section.collapsible ? getSectionCollapseId(sidx) : null">
                                            <div class="card-body page-section-body">
                                                <div v-for="(row, rowIndex) in section.rows" :key="rowIndex" class="row mb-2">
                                                    <div v-if="typeof row === 'string'" class="col-12">
                                                        <span class="text-muted" v-text="row"></span>
                                                    </div>
                                                    <div v-else-if="row.widgets && Array.isArray(row.widgets)" class="col-12">
                                                        <div class="row">
                                                            <div v-for="(item, itemIndex) in row.widgets" :key="itemIndex" class="col-auto">
                                                                <widget-renderer
                                                                    :widget-config="getWidgetConfig(item)"
                                                                    :widget-name="item"
                                                                    @execute="executeCommand">
                                                                </widget-renderer>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div v-else-if="row.columns && typeof row.columns === 'object'" class="col-12">
                                                        <div class="row">
                                                            <div v-for="(column, colIndex) in row.columns"
                                                                 :key="colIndex"
                                                                 :class="'col-md-' + (12 / Object.keys(row.columns).length)">
                                                                <div v-for="(item, itemIndex) in column.widgets" :key="itemIndex" class="mb-2">
                                                                    <widget-renderer
                                                                        :widget-config="getWidgetConfig(item)"
                                                                        :widget-name="item"
                                                                        @execute="executeCommand">
                                                                    </widget-renderer>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div v-else class="alert alert-warning">
                        В `gui.yaml` не найдено ни одного меню.
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalTitle">Подтверждение</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="confirmModalBody">
                    Вы уверены, что хотите выполнить это действие?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="confirmModalAccept">Подтвердить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/vendor/bootstrap.bundle.min.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/vendor/vue.global.js') }}?v={{ ASSETS_VERSION }}"></script>
    <!-- Передаем данные страницы без смешивания Jinja и JS -->
    <script id="page-data" type="application/json">
        {{ {"pageConfig": page_config, "allAttrs": all_attrs} | tojson }}
    </script>
    <script>
        window.pageData = JSON.parse(document.getElementById('page-data').textContent);
        console.log('Page data loaded:', window.pageData);
    </script>
    <!-- Загружаем виджеты -->
    <script src="{{ url_for('static', filename='js/widgets/string.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/int.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/float.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/list.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/ip_widgets.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/datetime_widgets.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/text.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/table.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/button.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/gui_parser.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/modal.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets/factory.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/widgets.js') }}?v={{ ASSETS_VERSION }}"></script>
    <script src="{{ url_for('static', filename='js/page.js') }}?v={{ ASSETS_VERSION }}"></script>
</body>
</html>
