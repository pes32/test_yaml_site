<header class="page-header">
    <div class="page-header-brand-wrap">
        <a class="page-header-brand" href="/">YAML System</a>
        <span class="page-header-version"
              title="Кликабельный макет. Без БД.">v.0.375 л.</span>
    </div>
    <nav class="page-header-actions" aria-label="Основная навигация">
        <a class="page-header-icon-link{% if header_active == 'postgres' %} is-active{% endif %}"
           href="/postgres"
           aria-label="Postgres"
           title="Postgres"
           {% if header_active == 'postgres' %}aria-current="page"{% endif %}>
            <img src="{{ url_for('serve_icon', filename='postgres.svg') }}" alt="">
        </a>
        <a class="page-header-icon-link"
           href="https://github.com/pes32/test_yaml_site"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="GitHub-репозиторий"
           title="GitHub-репозиторий">
            <img src="{{ url_for('serve_icon', filename='github.svg') }}" alt="">
        </a>
        {% if debug_tooling_enabled %}
        <a class="page-header-link" href="/debug" target="_blank" rel="noopener noreferrer">Debug</a>
        {% endif %}
        {% if sudoku_is_available() %}
        <a class="page-header-link{% if header_active == 'sudoku' %} is-active{% endif %}"
           href="/sudoku"
           {% if header_active == 'sudoku' %}aria-current="page"{% endif %}>Судоку</a>
        {% endif %}
    </nav>
</header>
