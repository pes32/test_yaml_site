      cancel: "Посмотрю сам"

demo_button:
  widget: button
  description: "Посмотреть виджеты"
  url: "/demo"

test_widget:
  widget: text
  description: ""
  width: 1150
  rows: 24
#  readonly: true
  default: |
    Данное поделие предназначено для создания различных систем на основе YAML-файлов. Исходно была идея сделать сайт-визитку, но получается, в силу специфики работы, учётная система.
    Такой способ позволяет делать различные системы без необходимости писать код (хотя разработчика для такой системы поди ещё найди).
    Синтаксис ямлов настолько прост, что с ними могут работать даже самые плохие, но очень дешёвые работники:
    - Старшеклассники;
    - Студенты;
    - Нейросети...

    Данное поделие умеет генерировать следующие элементы:
    - Объекты меню;
    - Табы (вкладки);
    - Блоки и сворачиваемые блоки;
    - Таблицы;
    - Диалоги;
    - Модальные окна;
    - Различные строковые виджеты;
    - Кнопки;

    Если следовать за подсказками в тексте, то можно ознакомится со всем функционалом данного поделия.
    Удачи в исследовании!

    Стэк приложения:
    | Бэк на Python | Фронт на JS | БД на Postgres