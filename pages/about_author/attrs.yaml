reptoid_img:
  widget: img
  description: ""
  sup_tex: "Автор. Секретное фото в цвете."
  source: "templates/reptoid.webp"
  width: 300

reptoid_desc:
  widget: text
  description: "Личное дело"
  rows: 12
  width: 1150
  readonly: true
  default: |
    1) ФИО: ████ ██████ ████████████
    2) Дата рождения: ██.██.19██ г.
    3) Место рождения: г. ███ква 
    4) Образование: Музыкальная Алкогольная Империя (МАИ), 9 факультет, кафедра "Сопротивление материалов, динамика и прочность машин"
    5) Специальность: ██████ - 'Прикладная механика'. Примечание: по специальности не работает и никогда не работал.
    6) Прочие сведения:
    - Душнила;
    - Любит котиков и не любит людей;
    - Пьёт пиво с водкой;
    - Знает как сыграть 'коричневую' ноту на басу;
    - С настоящим искусственным интеллектом (гос. структуры, банки и др. крупные корпорации) работает от 12 млн;
    - Любит сначала думать, а потом делать. Несмотря на это, слепил этот 'портал'.

