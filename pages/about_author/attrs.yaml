reptoid_img:
  widget: img
  label: ""
  sup_text: "Автор. Секретное фото в цвете."
  source: "templates/reptoid.webp"
  width: 300

reptoid_desc:
  widget: text
  label: "Личное дело"
  rows: 13
  width: 1200
  readonly: true
  default: |
    1) ФИО: ████ ██████ ████████████
    2) Дата рождения: ██.██.19██ г.
    3) Место рождения: г. ███ква 
    4) Образование: Музыкальная Алкогольная Империя (МАИ), 9 факультет, кафедра "Сопротивление материалов, динамика и прочность машин"
    5) Специальность: ██████ - 'Прикладная механика'.
    6) Прочие сведения:
    - Душнила;
    - Предпочитает сначала думать, а потом делать. Несмотря на это, слепил этот 'портал';
    - Может взять коричневую ноту на басу;
    - Пьёт водку с пивом;
    - Любит котиков;

