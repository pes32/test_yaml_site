# GUI для главной страницы - демонстрация всех виджетов

url: "/demo"

menu "Строковые виджеты":
  - icon: "test.svg"

  - tab "Демонстрация строковых виджетов":
    - icon: "test.svg"

    - collapse "Строковые виджеты":
      - icon: "test.svg"
      - row: demo_string, demo_text

    - box "Числовые виджеты (статичный блок)":
      - icon: "test.svg"
      - row: demo_int, demo_float

    - box:
        - "Это примеры для readonly"
        - row: demo_readonly
        - row: demo_int_readonly, demo_float_readonly

    - collapse "Списки":
      - row: demo_list, demo_multiselect

    - box "IP адреса":
      - row: demo_ip, demo_ip_mask

    - collapse "Дата и время":
      - row: demo_datetime
      - row: date_widget, time_widget

  - tab "Демонстрация кнопок":
    - icon: "test.svg"
    - collapse "Кнопки":
      - icon: "test.svg"
      - row: demo_button_command, demo_button_url
      - row: demo_button_dialog
      - row: button_icon_svg, button_null, button_with_icon
      - row: popup_button

# Модальные окна
popup_element_gui "Имя модального окна":
  - row: popup_string, popup_int
  - button: save_button_popup, CLOSE

menu "Таблицы":
  - icon: "test.svg"
  - tab "Демо-таблицы":
    - box "Таблицы":
      - row: demo_table, demo_table_editable

  - tab "Вкладка с журналом":
    - row: journal_table

  - tab "Вкладка с формой":
    - row: form_table