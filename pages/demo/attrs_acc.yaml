journal_table:
  widget: table
  description: "Журнал учёта"
  source: proc_name
  table_attrs: |
    operation /Операция
    doc /Документ
    passport /Паспорт
    mass_kg /Масса, кг

pack_types:
  widget: list
  multiselect: true
  source: ["Значение 1", "Значение 2", "Значение 3", "Значение 4"]

form_table:
  widget: table
  description: "Таблица ввода данных"
  source: proc_name
  table_attrs: |
    attr_id /Код №1
    attr_datetime /Дата и время :datetime №2
    attr_date /Дата :date №3
    attr_time /Время :time №4

    /Период
    t_days /Дней :80 №2
    t_years /Лет

    /МЗА
    mzua_tro /ТРО :100 №4
    mzua_gro /ЖРО №5

    mza /Суммарная №6
    v_rao /Объём РАО :100 #,.3f №7
    finance
    pack_type /Тип упаковки :80 :pack_types №8
    address /ip-адрес :ip
    op_date /Дата операции :datetime


