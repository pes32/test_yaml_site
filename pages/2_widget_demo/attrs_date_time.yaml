# Виджеты даты и времени (date, time, datetime)

# <name_attr>:                 # Имя атрибута (обязательно)
#   widget: date | time | datetime
#   label: "Текст"             # Подпись поля (обязательно)
#   sup_text: "Текст"          # Информационное сообщение под полем
#   default: "Значение"        # Значение по умолчанию
#   default: now               # Для всех трёх виджетов: подставить текущую дату/время
#   readonly: true             # Только для чтения (по умолчанию false, указывать не требуется)
#   width: 350 | "20rem"       # Ширина поля: число = px, строка = любое CSS-значение
#
# Поддерживаемые форматы ввода:
# - date: DD.MM.YYYY, DD/MM/YYYY, DD-MM-YYYY, YYYY-MM-DD
# - date: DD.MM, DD/MM, DD-MM (год подставится текущий)
# - date: DD (месяц и год подставятся текущие)
# - date: DDMM, DDMMYY, DDMMYYYY, YYYYMMDD
# - time: HH:MM, HH:MM:SS, HH.MM, HH, HHMM, HHMMSS

# === Дата и время ===

demo_datetime:
  widget: datetime
  label: "Дата и время"
  default: now

date_widget:
  widget: date
  label: "Дата"
  sup_text: "Выберите дату"

time_widget:
  widget: time
  label: "Время"
  sup_text: "Выберите время"
