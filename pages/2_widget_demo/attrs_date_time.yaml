# Атрибуты для главной страницы - демонстрация всех виджетов

# Общая структура атрибута
# <name_attr>:                                   # Имя атрибута (обязательно)
#   widget: "тип_виджета"                        # Тип виджета (обязательно)
#   label: "Описание"                      # Описание (обязательно. Не используется в кнопках-иконках)
#   sup_text: "Подсказка"                         # Информационное сообщение (опционально)
#   readonly: true                               # Только для чтения (по умолчанию false)
#   default: "Значение"                          # Начальное значение (опционально)
#   command: "имя_команды"                       # Команда для кнопок (опционально)
#                            - ui                # для обращения к модальному окну
#                            - pg                # для обращения к  postgress
#   url: "/путь/к/странице"                      # URL для перехода (опционально)
#   source: ["значение1", "значение2"]           # Источник данных для списков (опционально)
#   multiselect: true                            # Множественный выбор для списков (опционально)
#   headers: ["Параметр", "Значение"]            # Заголовки для таблиц (опционально)
#   icon: "test.svg"                             # Иконка (опционально)
#   hint: "Подсказка"                            # Текст во всплывающей подсказке
#   width: 34                                    # Ширина кнопки в px (по умолчанию 40)
#   rows: 3                                      # Количество строк для виджета text
#   dialog:                                      # Диалог подтверждения для кнопок (опционально)
#     title: "Заголовок"
#     text: "Текст сообщения"
#     accept: "Да"
#     cancel: "Отмена"

# === Дата и время ===

demo_datetime:
  widget: datetime
  label: "Дата и время"
  sup_text: "Выберите дату и время"

date_widget:
  widget: date
  label: "Дата"
  sup_text: "Выберите дату"

time_widget:
  widget: time
  label: "Время"
  sup_text: "Выберите время"