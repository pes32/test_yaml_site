# Виджеты кнопок (`button` и `split_button`)

# <name_attr>:                # Имя атрибута (обязательно)
#   widget: button            # Тип виджета (обязательно)
#   label: "Текст"            # Подпись на кнопке (для режима с текстом или иконка+текст; для только-иконки не нужен)
#   sup_text: "Текст"         # Текст под кнопкой (опционально)
#   default: значение         # Внутреннее значение виджета (опционально, для кнопки редко нужно)
#   icon: "file.svg"          # Иконка: файл из templates/icons/ или класс Font Awesome (опционально)
#   hint: "Текст"             # Подсказка title при наведении (для только-иконки; иначе title = label)
#   fon: true                 # Фон у кнопки только-иконки (без fon — «призрачная» иконка)
#   size: 24                  # Размер иконки в px (по умолчанию 24);
#   width: 40                 # Ширина кнопки в px. Также используется для задания шрины у других элементов;
#   command: "имя"            # Команда на бэкенд через POST /api/execute (опционально);
#   command: "modal_id -ui"   # Открыть модалку: <имя_файда> yaml для модальной формы. "-ui" - приставка для указания, что это ui;
#   url: "/path"              # Переход по URL (опционально);
#   source: <путь>            # Путь к файлу для открытия/скачивания;
#   select_attrs: a, b        # Имена виджетов для последующего заполнения. Синтаксис зарезервирован, механизм пока не реализован;
#   dialog:                   # Диалог подтверждения перед url или command (опционально);
#     title: "Заголовок"
#     text: "Текст"
#     accept: "Да"
#     cancel: "Отмена"
#
# split_button использует те же визуальные attrs, но умеет показывать dropdown
# из нескольких действий. Действия задаются через multiline-string:
#
# <name_attr>:
#   widget: split_button
#   label: "Сплит-кнопка"
#   icon: "file.svg"
#   url: |
#     /page_a | Перейти к A
#     /page_b
#   source: |
#     templates/file.pdf | PDF
#   command: |
#     test_command | Тестовая команда
#     another_command
#
# Порядок действий фиксированный: url -> source -> command.

# === Визуальное описание кнопок ===

button_1:
  widget: button
  icon: test.svg
  fon: true
  hint: "Кнопка c фоном и иконкой"

button_2:
  widget: button
  icon: test.svg
  hint: "Кнопка без фона с иконкой"

button_3:
  widget: button
  label: Кнопка

button_4:
  widget: button
  label: Иконка + кнопка на 500px
  icon: test.svg
  width: 500
  sup_text: "И текст снизу. На случай, если надо подписать кнопку"

button_5:
  widget: button
  icon: test.svg
  size: 100
  fon: true
  hint: "ОГРОМНАЯ КНОПКА"

button_6:
  widget: split_button
  label: Сплит кнопка
  icon: test.svg
  command: |
    fake_visual_action_1 | Первый пункт
    fake_visual_action_2 | Второй пункт
    fake_visual_action_3 | Третий пункт

# === Функциональное описание кнопок ===

