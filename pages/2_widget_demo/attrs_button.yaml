# Атрибуты для главной страницы - демонстрация всех виджетов

# <name_attr>:                                   # Имя атрибута (обязательно)
#   widget: "тип_виджета"                        # Тип виджета (обязательно)
#   label: "Описание"                      # Описание (обязательно. Не используется в кнопках-иконках)
#   sup_text: "Подсказка"                         # Информационное сообщение (опционально)
#   readonly: true                               # Только для чтения (по умолчанию false)
#   default: "Значение"                          # Начальное значение (опционально)
#   command: "имя_команды"                       # Команда для кнопок (опционально)
#                            - ui                # для обращения к модальному окну
#                            - pg                # для обращения к  postgress
#   url: "/путь/к/странице"                      # URL для перехода (опционально)
#   source: ["значение1", "значение2"]           # Источник данных для списков (опционально)
#   multiselect: true                            # Множественный выбор для списков (опционально)
#   headers: ["Параметр", "Значение"]            # Заголовки для таблиц (опционально)
#   icon: "test.svg"                             # Иконка (опционально)
#   hint: "Подсказка"                            # Текст во всплывающей подсказке
#   width: 34                                    # Ширина кнопки в px (по умолчанию 40)
#   rows: 3                                      # Количество строк для виджета text
#   dialog:                                      # Диалог подтверждения для кнопок (опционально)
#     title: "Заголовок"
#     text: "Текст сообщения"
#     accept: "Да"
#     cancel: "Отмена"
#   input_attrs: asd
#   output__attrs: asd

# === Визуальное описание кнопок ===

button_1:
  widget: button
  icon: test.svg
  fon: true
  hint: "Кнопка c фоном и иконкой"

button_2:
  widget: button
  icon: test.svg
  hint: "Кнопка без фона с иконкой"

button_3:
  widget: button
  label: Кнопка

button_4:
  widget: button
  label: Иконка + кнопка на 500px
  icon: test.svg
  width: 500
  sup_text: "И текст снизу. На случай, если надо подписать кнопку"

button_5:
  widget: button
  icon: test.svg
  size: 100
  fon: true
  hint: "ОГРОМНАЯ КНОПКА"

# === Функциональное описание кнопок ===

func_1:
  widget: button
  label: "Команда"
  command: test_command

func_2:
  widget: button
  label: "Переход (url)"
  url: "https://youtu.be/dQw4w9WgXcQ"

func_3:
  widget: button
  label: "Диалог (url)"
  dialog:
    title: "Понравился рикрол?"
    text: "Хотите ещё?"
    accept: "Конечно, хочу!"
    cancel: "Нет, спасибо"
  url: "https://youtu.be/dQw4w9WgXcQ"

func_4:
  widget: button
  label: "Диалог (command)"
  dialog:
    title: "Заголовок"
    text: "Очень длинный текст сообщения, которое нужно для подтверждения действия"
    accept: "Да"
    cancel: "Отмена"
  command: test_command

# === Модальные окна ===

modal_button:
  widget: button
  label: "Модальное окно"
  command: modal_gui -ui

modal_str:
  widget: text
  label: ""
  rows: 4
  width: 350
  readonly: true
  default: |
    modal_button:
      widget: button
      label: "Модальное окно"
      command: modal_gui -ui

modal_save_button:
  widget: button
  label: "Сохранить"
  command: save 

# Кнопка для перехода к кнопкам

button_0:
  widget: button
  label: Перейти
  url: "/widget_demo#menu-0-tab-1"