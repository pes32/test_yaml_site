# Числовые виджеты (int, float)

# <name_attr>:                # Имя атрибута (обязательно)
#   widget: int | float       # Тип виджета: int — целое, float — дробное
#   label: "Текст"            # Подпись поля (обязательно)
#   sup_text: "Текст"         # Информационное сообщение под полем (sup_text = supporting text)
#   placeholder: "Текст"      # Подсказка в пустом поле при фокусе
#   default: значение         # Значение по умолчанию
#   readonly: true            # Только для чтения (по умолчанию false, указывать не требуется)
#   width: 350                # Ширина поля в px (если не устраивает текущая ширина)
#   regex: "^паттерн$"        # Регулярное выражение для валидации ввода
#   err_text: "Текст"         # Текст ошибки при невалидном значении

# === ЧИСЛОВЫЕ ВИДЖЕТЫ ===

int_1:
  widget: int
  label: "1) Целое число"

int_2:
  widget: int
  label: "2) Длинное целое число"
  sup_text: "с подсказкой, regex и плейсхолдером"
  err_text: "Введите число 42"
  regex: "^42$"
  width: 350
  placeholder: "Введите число 42"

int_3:
  widget: int
  label: "3) Заполненное число"
  default: 42

int_4:
  widget: int
  label: "4) readonly и default"
  default: 123456789
  readonly: true
  sup_text: "Это поле нельзя изменить"

# Число с плавающей точкой

float_1:
  widget: float
  label: "1) float"

float_2:
  widget: float
  label: "2) Число с плавающей точкой"
  sup_text: "с подсказкой, regex и плейсхолдером"
  regex: "^3(.1(4(1(5(9(2)?)?)?)?)?)?$"
  err_text: "Введите число 3,141592"
  width: 350
  placeholder: "Введите число π"

float_3:
  widget: float
  label: "3) Заполненное число"
  default: 3.141592

float_4:
  widget: float
  label: "4) readonly и default"
  default: 2.718281
  readonly: true
  sup_text: "Это поле нельзя изменить"
