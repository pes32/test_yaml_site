# GUI для главной страницы - демонстрация всех виджетов

title: "Виджеты"

url: "/widget_demo"

menu "Строковые виджеты":
  - icon: "test.svg"

  - tab "Демонстрация строковых виджетов":
    - icon: "test.svg"

    - collapse "Строковые виджеты":
      - icon: "test.svg"
      - "В этом сворачиваемом списке представлены различные строковые виджеты. Здесь и далее я буду использовать тот же подход."
      - "1 - минималистичный виджет;"
      - "2 - максимальный виджет, доступный для ввода;"
      - "3 - предзаполненный виджет;"
      - "4 - readonly виджет;"
      - row: str_1, str_2, str_3, str_4
      - row: text_1, text_2, text_3, text_4
      - "Кстати, описание этих тестовых страниц в yaml-файлах является документацией к системе."

    - box "Числовые виджеты (статичный блок)":
      - icon: "test.svg"
      - row: int_1, int_2, int_3, int_4
      - row: float_1, float_2, float_3, float_4

    - box "Списки":
      - "Списки бывают 3 видов: список с поиском (по умолчанию), выбор только из списка и c множественным выбором."
      - "Развернуть список можно через: Enter или alt+down (win), opt+down (mac). Свернуть: также + esc."
      - "Удалить значение можно через backspace или delete."
      - row: list_1, list_2, list_3
      - row: list_4, list_5
      - "Для большого текста в списке автоматом выводится hint при наведении курсора."
      - "Списки в readonly не показываю, но вы уже догадываетесь как они будут выглядеть."

    - box:
      - "IP адреса. Кстати, это блок box без заголовка."
      - "В качестве разделителя принимается: точка, запятая или пробел."
      - row: ip_1, ip_2, ip_3, ip_4
      - "Поля ip и im_mask с автоматической валидацией адреса. 'err_text' у них зашит в коде виджета."
      
    - "Дата и время. Для них этот рептилойд даже рамку зажал =("
    - row: demo_datetime
    - "Виджет даты преобразует значение вне зависимости от ввода: с точкой, с запятой, слешами, с пробелами или без разделителя"
    - "Можно ввести только день и будет добавлен текущий месяц и год."
    - "Можно ввести день и месяц, год добавится сам. Подробно описано в yaml-файле"
    - row: date_widget, time_widget
    - "#########################################"
    - row: desc_1, button_0
  
  - tab "Демонстрация кнопок":
    - collapse "Внешний вид кнопок":
      - "Какие бывают кнопки визуально:"
      - "1 - из иконки с фоном (текст указывается через hint);"
      - "2 - из иконки без фона (наведи на неё курсор);"
      - "3 - с текстом;"
      - "4 - с текстом и картинкой;"
      - row: button_1, button_2, button_3, button_4
      - "Кнопку можно сделать ооочень большой:"
      - row: button_5

    - collapse "Функции кнопок":
      - "Нажми их все"
      - row: func_1, func_2, func_3, func_4

    - collapse "Модальные окна":
      - "Открытие какого-либо модального окна, обычно, осуществляется через кнопку. Последуем за общим стандартом."
      - row: modal_button
      - "Эта кнопка отличается тем, что ссылается на элемент ui. Вот её описание:"
      - row: modal_str
      - "А этот modal_gui -ui, в свою очередь, описывается в gui.yaml, потому что это элемент ui."
      - "Его описание ничем не отличается от текущей разметки страницы."

# Модальные окна
modal_gui "Имя модального окна":
  - icon: "test.svg" # Опциональная иконка модального окна
  - tab "Первый таб":
    - icon: "test.svg"
    - collapse "Строковые виджеты":
      - row: str_1, str_2, str_3, str_4
      - row: text_1, text_2, text_3, text_4
  - tab "Второй таб":
    - box "Числовые виджеты":
      - row: int_1, int_2, int_3, int_4
      - row: float_1, float_2, float_3, float_4
  - tab "Третий таб":
    - icon: "test.svg"
    - box:
      - row: list_1, list_2, list_3
      - row: list_4, list_5
  - button: modal_save_button, CLOSE

menu "Таблицы":
  - icon: "test.svg"
  - tab "Демо-таблицы":
    - box "Таблицы":
      - row: demo_table, demo_table_editable

  - tab "Вкладка с журналом":
    - row: journal_table

  - tab "Вкладка с формой":
    - row: form_table