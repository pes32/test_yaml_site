# Синтаксис gui.yaml (краткая шпаргалка)
# url: "/"
# title: "Заголовок страницы" - Виден на вкладке браузера и в заголовке страницы
# menu "Название меню":
#   - icon: "icon.svg"
#   - tab "Название вкладки":
#     - icon: "tab.svg"
#     - collapse "Название блока":
#       - row: widget_a, widget_b
#     - box:
#       - rows:
#         - "Произвольный текст"
#         - row: widget_c, widget_d
#   - box "Меню без вкладок":
#     - row: widget_e
#
# Модальные окна (отдельные файлы pages/<страница>/modal_<id>.yaml, ленивая загрузка по кнопке):
#   id = имя файла без расширения, напр. modal_gui.yaml → command: modal_gui -ui
#   В файле: корень — список ИЛИ { name, icon?, content: [ ... ] }

# GUI для главной страницы - демонстрация всех виджетов

title: "Виджеты"

url: "/widget_demo"

menu "Строковые виджеты":
  - icon: "test.svg"

  - tab "Демонстрация строковых виджетов":
    - icon: "test.svg"

    - collapse "Строковые виджеты":
      - icon: "test.svg"
      - "В этом сворачиваемом списке представлены различные строковые виджеты. Здесь и далее я буду использовать тот же подход."
      - "1 - минималистичный виджет;"
      - "2 - максимальный виджет, доступный для ввода;"
      - "3 - предзаполненный виджет;"
      - "4 - readonly виджет;"
      - row: str_1, str_2, str_3, str_4
      - row: text_1, text_2, text_3, text_4
      - "Кстати, описание этих тестовых страниц в yaml-файлах является документацией к системе."
      - "Если вдруг вы нашли тут баг, то я знаю, что виджет textarea немного сломан. Им всё равно никто не пользуется."

    - box "Числовые виджеты (статичный блок)":
      - icon: "test.svg"
      - row: int_1, int_2, int_3, int_4
      - row: float_1, float_2, float_3, float_4

    - box "Списки":
      - "Списки бывают 3 видов: список с поиском (по умолчанию), выбор только из списка и c множественным выбором."
      - "Развернуть список можно через: Enter или alt+down (win), opt+down (mac). Свернуть: также + esc."
      - "Удалить значение можно через backspace или delete."
      - row: list_1, list_2, list_3
      - row: list_4, list_5
      - "Теперь справочники. Визуально похожи на list, но с модальным окном."
      - "В multiselect voc можно вводить коды вручную через запятую."
      - row: voc_1, voc_3
      - "В модалках есть баг с выбором элемента клавишами при клике мышью. Когда-нибудь поправлю. Или нет."

    - box:
      - "IP адреса. Кстати, это блок box без заголовка."
      - "В качестве разделителя принимается: точка, запятая или пробел."
      - row: ip_1, ip_2, ip_3, ip_4
      - "Поля ip и im_mask с автоматической валидацией адреса. 'err_text' у них зашит в коде виджета."
      
    - "Дата и время. Для них этот рептилойд даже рамку зажал =("
    - row: demo_datetime
    - "Виджет даты преобразует значение вне зависимости от ввода: с точкой, с запятой, слешами, с пробелами или без разделителя"
    - "Можно ввести только день и будет добавлен текущий месяц и год."
    - "Можно ввести день и месяц, год добавится сам. Подробно описано в yaml-файле"
    - row: date_widget, time_widget
    - "#########################################"
    - row: desc_1, button_0
  
  - tab "Демонстрация кнопок":
    - collapse "Внешний вид кнопок":
      - "Какие бывают кнопки визуально:"
      - "1 - из иконки с фоном (текст указывается через hint);"
      - "2 - из иконки без фона (наведи на неё курсор);"
      - "3 - с текстом;"
      - "4 - с текстом и картинкой;"
      - row: button_1, button_2, button_3, button_4
      - "Кнопку можно сделать ооочень большой:"
      - row: button_5
      - "И есть split_button: левая часть у неё не нажимается, а список открывается стрелкой справа."
      - row: button_6

    - collapse "Функции кнопок":
      - "Нажми их все."
      - row: func_1, func_2, func_3, func_4, func_5
      - row: func_6, func_7

    - collapse "Модальные окна":
      - "Открытие какого-либо модального окна обычно осуществляется через кнопку. Последуем за общим стандартом."
      - row: modal_button
      - "Эта кнопка отличается тем, что ссылается на элемент ui. Вот её описание:"
      - row: modal_str
      - "А этот modal_gui -ui, в свою очередь, описывается в modal_gui.yaml, как отдельный элемент ui."
      - "Если содержимое страницы нужно описывать в одном файле, то модальные окна можно описывать отдельно."
      - "Такой способ позволяет сделать, например, учётный журнал с разными карточками ввода."
      - "Это уже сделано для 9 форм и split-button. Каждая форма описана в отдельном файле."
      - "Ниже можно посмотреть описание модалки, а в соседнем табе приведены примеры нескольких ямлов. Или можно перейти к таблицам." 
      - row: modal_gui_str
      - "Мне показалось, что у любой модалки всегда есть кнопка закрытия без сохранения,"
      - "поэтому кнопка CLOSE является системной и не требует описания."

  - tab "Посмотреть ямлы":
    - "Здесь приведено 2 примера: файл разметки gui.yaml и файл строковых виджетов attrs_str.yaml"
    - "Оба файла написаны руками и могут отличаться от конечной версии реальных файлов в репозитории."
    - collapse "gui.yaml":
      - "Файл gui.yaml, описывающий /widget_demo."
      - row: gui_yaml
    - collapse "attrs_str.yaml":
      - row: attrs_str

  - tab "Картинки!":
    - "Добавление изображений не является целевой задачей данного поделия, но не показать их нельзя. Поэтому будут мемы."
    - "Добавить можно любое изображение, если указать ему путь в source. Там же можно задать размер через width и подпись сверху, снизу или вообще без."
    - "С большими изображениями размер подписей кажется совсем смешным. Лучше использовать такой вотъ текст."
    - "Мем 1:"
    - row: img_1
    - "Мем 2:"
    - row: img_2
    - "Мем 3:"
    - row: img_3

menu "Таблицы":
  - icon: "test.svg"
  - tab "Демо-таблицы":
    - box "Таблицы":
      - "На текущей вкладке приведены простейшие таблицы. После ознакомления с ними можно перейти на следующую вкладку."
      - "Что можно с ними делать:"
      - "1. Создавать новую строку при заполнении через Enter в последней ячейке."
      - "2. Вбрать всю строку: Shift+Space."
      - "3. Удалить выбранную строку: Ctrl+Minus."
      - "4. Создать строку ниже: выбрать всю строку и Shift+Ctrl+Plus."
      - "5. Переход в режим редактирования ячейки: F2 или двойной клик ЛКМ."
      - "6. Строки и ячейки можно выбирать через Shift + клавиши или мышь."
      - "7. Несколько выбранных строк/ячеек можно очистить через Backspace/Delete."
      - "8. Быстрая навигация по таблице через Cmd+стрелки для перемещения. Аналогично для Win/Lin."
      - "9. Есть быстрые переходы с выделением через Shift+Cmd+стрелки. Аналогично для Win/Lin."
      - "10. Можно перемещать строку через Option+стрелки вверх/вниз. Для Win/Lin через Alt."
      - "11. Можно дублировать строки через Shift+Option+стрелки вверх/вниз. Для Win/Lin через Alt."
      - "12. Есть сортировка в заголовках таблицы по клику или через контекстное меню."
      - "13. Можно включить группировку через меню заголовка столбца. Группировку можно делать вложенной на несколько столбцов."
      - "14. Если таблица не readonly, даже с группировкой её можно редактировать."
      - "15. Таблица с lazy_load есть в самом конце списка. Срабатывает от 100 строк"
      - "16. Там же, кстати, включена фиксация заголовка при прокрутке. Отключается через меню заголовка. По умолчанию включается в ямле."
      - "17. На соседней вкладке есть сложна таблица с ключенной нумерацией строк. Строки можно пересчитать через контекстное меню"
      - "Внимательный исследователь должен заметить, что это очень похоже на Excel и VS Code... Да, это так."
      - row: demo_table_1, demo_table_2
      - "По умолчанию таблицы имеют зебру. Её можно отключить."
      - row: demo_table_3, demo_table_4
      - "Отключаем сортировку в заголовках таблицы:"
      - row: demo_table_5, demo_table_6
      - row: demo_table_7

  - tab "Сложная таблица":
    - "Сложная таблица с разным описанием по столбцам."
    - "Здесь есть: строки, разные числа, дата и время, ip-адреса в разных записях."
    - "Документация к таблицам описана в файле table_demo.yaml. Или на соседней вкладке."
    - "Все текущие виджеты и таблицы - кликабельный макет, на котором удобно делать дебаг фронта."
    - "По кнопке ниже можно перейти на страницу для демо и отладки бэка (не доделано, не работает)."
    - row: button_backend_demo
    - row: big_table

  - tab "Yaml-таблиц":
    - row: all_table_yaml
