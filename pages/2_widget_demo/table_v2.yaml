table_v2_markup:
  widget: table
  label: "Table v2: таблица с разметкой"
  toolbar: true
  abc: true
  line_numbers: true
  sticky_header: true
  table_attrs: |
    /Базовые данные
    task /Задача :220 №1
    owner /Ответственный :160 №2
    amount /Сумма :120 №3
    quantity /Кол-во :100 №4

    /Даты и адреса
    due_date /Дата :150 №5
    due_time /Время :130 №6
    ip_addr /IP :170 №7
    subnet /IP mask :190 №8

    /Выбор и текст
    status /Статус :160 №9
    mode /Режим :150 №10
    note /Комментарий :260 №11
  source:
    - ["Подготовить toolbar", "Анна", "12500.5", "3", "2026-04-28", "09:30", "192.168.0.1", "10.20.30.40/24", "В работе", "A1", "Базовая строка для проверки форматирования"]
    - ["Проверить copy/paste", "Борис", "980.75", "12", "2026-04-29", "14:15", "10,0,0,5", "172.16.0.1/16", "Ожидание", "B2", "Вставка должна обходить служебный номер"]
    - ["Поймать ошибки типов", "Вера", "bad-number", "x", "31.12.2026", "25:99", "222/222/222222", "10.10.10.10/33", "Риск", "C3", "Здесь есть значения для будущей подсветки ошибок"]
    - ["Автоширина", "Глеб", "1234567.89", "1", "2026-05-03", "08:00", "127.0.0.1", "192.168.1.1/24", "Готово", "D4", "Очень длинный комментарий для проверки ограничения автоподбора ширины колонки"]
