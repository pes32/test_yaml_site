# === ТАБЛИЦЫ ===
# sticky_header: true  # Только стартовое состояние; в runtime пользователь может переключить его из меню заголовка
# sort: false          # Отключает сортировку
# line_numbers: true   # Добавляет служебную колонку №
#                      # Во внешний payload (getValue/setValue/input) колонка № не попадает.
#                      # line_numbres — старая опечатка черновика, runtime её не поддерживает.
# Контекстное меню заголовка умеет:
#   sticky_header toggle  — закрепление заголовка в runtime
#   перенос по словам     — по умолчанию ячейки однострочные с хинтом при обрезании
# table_lazy:
#   true   — всегда использовать lazy pipeline.
#   false  — всегда выключить lazy.
#   omit   — auto: lazy включится сам, когда строк больше TABLE_LAZY_THRESHOLD (сейчас 100).

# table поддерживает: str, int, float, date, time, datetime, list, ip, ip_mask.


# Таблица (статичная, только просмотр)
demo_table_1:
  widget: table
  label: "Это справочная таблица:"
  sup_text: "Статичная таблица без редактирования"
  table_attrs: |
    name /Имя
    age /Возраст
    city /Город
  source: [["Иван", "25", "Москва"], ["Мария", "30", "СПб"], ["Петр", "35", "Казань"]]
  readonly: true

# Таблица (редактируемая пользователем)
demo_table_2:
  widget: table
  label: "Таблица редактируемая, 750px:"
  sup_text: "Пользователь может изменять значения в ячейках"
  width: 750px
  table_attrs: |
    param /Параметр (300px) :300
    value_1 /Значение 1 (210px) :210
    value_2 /Значение 2 (остаток)

demo_table_3:
  widget: table
  label: "Справочная, без зебры:"
  sup_text: "Статичная таблица без редактирования"
  zebra: false
  table_attrs: |
    name /Имя
    age /Возраст
    city /Город
  source: [["Иван", "25", "Москва"], ["Мария", "30", "СПб"], ["Петр", "35", "Казань"]]
  readonly: true

demo_table_4:
  widget: table
  label: "Таблица редактируемая, без зебры:"
  zebra: false
  sup_text: "Здесь задан вывод 3-х пустых строк"
  row: 3
  table_attrs: |
    param /Параметр
    value_1 /Значение 1
    value_2 /Значение 2

demo_table_5:
  widget: table
  label: "Справочная, без сортировки:"
  sup_text: "Статичная таблица без редактирования"
  sort: false
  table_attrs: |
    name /Имя
    age /Возраст
    city /Город
  source: [["Иван", "25", "Москва"], ["Мария", "30", "СПб"], ["Петр", "35", "Казань"]]
  readonly: true

demo_table_6:
  widget: table
  label: "Таблица редактируемая, без сортировки:"
  sort: false
  row: 3
  table_attrs: |
    param /Параметр
    value_1 /Значение 1
    value_2 /Значение 2


# Журнал учёта
journal_table:
  widget: table
  label: "Журнал учёта"
  source: proc_name
  table_attrs: |
    operation /Операция
    doc /Документ
    passport /Паспорт
    mass_kg /Масса, кг

# Справочник
pack_types:
  widget: list
  multiselect: true
  source: ["Значение 1", "Значение 2", "Значение 3", "Значение 4"]

# Отчётная форма
form_table:
  widget: table
  line_numbers: true
  label: "Таблица ввода данных"
  source: proc_name
  table_attrs: |
    attr_id /Код №1
    attr_datetime /Дата и время :datetime №2
    attr_date /Дата :date №3
    attr_time /Время :time №4

    /Период
    t_days /Дней :80 №2
    t_years /Лет

    /МЗА
    mzua_tro /ТРО :100 №4
    mzua_gro /ЖРО №5

    mza /Суммарная №6
    v_rao /Флоат РАО :100 #,.3f №7
    v_rao /Эксп :100 #,.2e №7
    finance
    pack_type /Тип упаковки :80 :pack_types №8
    address /ip-адрес :ip
    op_date /Дата операции :datetime
