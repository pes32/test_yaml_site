# Атрибуты строковых виджетов (str, text)

# <name_attr>:                # Имя атрибута (обязательно)
#   widget: str | text        # Тип виджета. str — однострочное поле, text — многострочное (textarea). "str" можно никогда не указывать.
#   label: "Текст"            # Подпись поля (обязательно)
#   sup_text: "Текст"         # Информационное сообщение под полем (sup_text = supporting text)
#   placeholder: "Текст"      # Подсказка для ввода внутри элемента
#   default: "Значение"       # Значение по умолчанию
#   readonly: true            # Только для чтения (по умолчанию false, указывать не требуется)
#   width: 350                # Ширина поля в px (если не устраивает текущая ширина))
#   rows: 3                   # Количество отображаемых строк по умолчанию (только для text)
#   regex: "^паттерн$"        # Регулярное выражение для валидации ввода
#   err_text: "Текст"         # Текст ошибки при невалидном значении

# === СТРОКОВЫЕ ВИДЖЕТЫ ===
# === Строки

str_1:
  label: "1) Пустая строка"

str_2:
  widget: str                         # Для str задаётся по умолчанию и не требует указания. Добавлено для примера.
  label: "2) Пустая длинная строка"
  sup_text: "с подсказкой, regex и плейсхолдером"
  regex: "^[a-zA-Z0-9]{0,5}$"
  err_text: "Латинские буквы и цифры, макс. 5 символов"
  width: 350
  placeholder: "Плейсхолдер"

str_3:
  label: "3) Заполненная строка"
  default: "Пример текста"

str_4:
  label: "4) readonly and default"
  default: "Пример текста"
  readonly: true
  sup_text: "Это поле нельзя изменить"

# === Многострочный текст (textarea)
text_1:
  widget: text
  label: "1) Textarea"
  rows: 1

text_2:
  widget: text
  label: "2) Длинный многострочный текст"
  sup_text: "с подсказкой, regex и плейсхолдером"
  regex: "^(?:[a-zA-Z0-9]{0,10}\r?\n)*[a-zA-Z0-9]{0,10}$"
  err_text: "Латинские буквы и цифры, макс. 10 на строку"
  rows: 2
  width: 348 #resize добавляет лишние 2 px, а нейронки и я не можем в стили, так что проще руками поправить
  placeholder: "Введите многострочный текст..."

text_3:
  widget: text
  label: "3) Многострочный текст"
  default: "Кстати, это штатная высота этого поля, но её можно изменить"

text_4:
  widget: text
  label: "4) Многострочный текст в readonly"
  default: |
    В котором умещается
    целых
    четыре
    строки
  readonly: true
  sup_text: "Это поле нельзя изменить"
  rows: 4
