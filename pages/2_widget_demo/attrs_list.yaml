# Виджет списка (list)

# <name_attr>:                # Имя атрибута (обязательно)
#   widget: list              # Тип виджета: список
#   label: "Текст"            # Подпись поля (обязательно)
#   sup_text: "Текст"         # Информационное сообщение под полем
#   placeholder: "Текст"      # Подсказка в пустом поле при фокусе
#   default: "Значение"       # Значение по умолчанию (строка или массив для multiselect)
#   readonly: true            # Только для чтения (по умолчанию false)
#   source: ["а", "б", "в"]   # Источник данных для списка (обязательно для list)
#   editable: false           # Только выбор, без ввода и поиска (по умолчанию true)
#   multiselect: true         # Множественный выбор (по умолчанию false)
#   width: 350                # Ширина поля в px

# === СПИСКИ ===

list_1:
  widget: list
  label: "1) Список 🔍"
  source: ["Опция 1", "Опция 2", "Опция 3", "Опция 4"]

list_2:
  widget: list
  label: "2) Длинный cписок 🔍"
  sup_text: "Список с подсказкой и плейсхолдером"
  source: ["Опция 1", "Опция 2", "Опция 3", "Опция 4", "Опция 5", "Опция 6", "Опция 7", "Опция 8", "Опция 9", "Опция 10", "Опция 11"]
  placeholder: "Выбери опцию"
  width: 350

list_3:
  widget: list
  label: "3) Список с default"
  default: "Опция 1"
  source: ["Опция 1", "Опция 11", "Опция 111"]

list_4:
  widget: list
  label: "4) Список списка"
  editable: false
  source: ["Опция 1", "Опция 2", "Опция 3"]

list_5:
  widget: list
  label: "4) Multiselect"
  multiselect: true
  placeholder: "Выбери 3 шт"
  source: ["Опция 1", "Опция 2", "Опция 3", "Опция 4", "Опция 5", "Опция 6", "Опция 7", "Опция 8", "Опция 9", "Опция 10", "Опция 11"]
