# IP-виджеты (ip, ip_mask)

# <name_attr>:                # Имя атрибута (обязательно)
#   widget: ip | ip_mask      # Тип виджета: ip — адрес, ip_mask — адрес с CIDR-маской (xxx.xxx.xxx.xxx/xx)
#   label: "Текст"            # Подпись поля (обязательно)
#   sup_text: "Текст"         # Информационное сообщение под полем (sup_text = supporting text)
#   placeholder: "Текст"      # Подсказка в пустом поле при фокусе
#   default: "значение"       # Значение по умолчанию (IP или IP/маска в формате xxx.xxx.xxx.xxx или xxx.xxx.xxx.xxx/xx)
#   readonly: true            # Только для чтения (по умолчанию false, указывать не требуется)
#   width: 350                # Ширина поля в px (если не устраивает текущая ширина)

# === IP АДРЕСА ===

ip_1:
  widget: ip
  label: "IP адрес"

ip_2:
  widget: ip
  label: "Длинный IP адрес"
  sup_text: "C подсказкой и placeholder"
  placeholder: "Введи IP адрес..."
  width: 350

ip_3:
  widget: ip_mask
  label: "IP адрес c маской"
  placeholder: "ххх.ххх.ххх.х/ххх"
  sup_text: "и подсказкой c placeholder"

ip_4:
  widget: ip_mask
  label: "IP адрес c маской"
  default: "255.255.255.0/24"
  readonly: true