start_button_1:
    widget: button
    label: "Нажми меня!"
    url: "#menu-1-tab-0"
    dialog:
      title: "Воу-воу, не так быстро!"
      text: |
        Сначала нужно посмотреть на UI элементы во втором меню,
        а потом смотреть на виджеты.
      accept: "Давай уже!"
      cancel: "Посмотрю сам"

start_button_2:
    widget: button
    label: "Не нажимать!"
    url: "#menu-1-tab-1"
    dialog:
      title: "Зачем нажал?"
      text: |
        Если ты уже ознакомился с UI элементами, то на второй вкладке есть кнопка, которая ведёт на страницу с виджетами.
      accept: "Открывай"
      cancel: "Сам открою"

demo_button:
  widget: button
  label: "Посмотреть виджеты"
  url: "/widget_demo"

test_widget:
  widget: text
  label: ""
  width: 1300
  rows: 26
  readonly: true
  default: |
    Текущий портал - моё видение на создание систем. Учётная это система или какая-либо иная - не важно.
    В основе описания интерфейса лежат yaml-файлы. Таким способом удобнее всего создавать повторяющиеся элементы, например, карточки ввода.
    Такой способ позволяет делать различные системы без необходимости писать код (хотя разработчика для такой системы поди ещё найди).
    Получилось немного гипертрофированно, т.к. здесь ВСЁ на ямлах, но я вообще хотел сделать сайт-визитку...

    Синтаксис ямлов настолько прост, что с ними могут работать даже самые плохие, но иногда дешёвые работники:
    - Старшеклассники и студенты;
    - Системные и бизнес-аналитики;
    - Любители нейросетей и сами нейронки...

    Данное поделие умеет генерировать следующие элементы:
    - Объекты меню;
    - Табы (вкладки);
    - Блоки и сворачиваемые блоки;
    - Таблицы;
    - Диалоги;
    - Модальные окна;
    - Различные строковые виджеты;
    - Кнопки;

    Если следовать за подсказками в тексте, то можно ознакомится со всем функционалом данного поделия.
    Удачи в исследовании!

    Стэк приложения:
    | Бэк на Python | Фронт на JS | БД на Postgres