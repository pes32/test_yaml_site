# Атрибуты для главной страницы - демонстрация всех виджетов

# Общая структура атрибута
# attribute_structure:                # Имя атрибута (обязательно)
#   widget: "тип_виджета"             # Тип виджета (обязательно)
#   description: "Описание"           # Описание поля (обязательно)
#   info: "Подсказка"                 # Информационное сообщение (опционально)
#   readonly: true                    # Только для чтения (по умолчанию false)
#   default: "Значение"               # Начальное значение (опционально)
#   command: "имя_команды"            # Команда для кнопок (опционально)
#   url: "/путь/к/странице"           # URL для перехода (опционально)
#   output_attrs: ["attr1", "attr2"]  # Атрибуты для передачи (опционально)
#   input_attrs: ["attr3", "attr4"]   # Атрибуты для получения (опционально)
#   source: ["значение1", "значение2"] # Источник данных для списков (опционально)
#   multiselect: false                # Множественный выбор для списков (опционально)
#   headers: ["Параметр", "Значение"]  # Заголовки для таблиц (опционально)
#   data: [["timeout", "30"], ["retries", "3"]]  # Данные для таблиц (опционально)
#   dialog:                           # Диалог подтверждения для кнопок (опционально)
#     title: "Заголовок"
#     text: "Текст сообщения"
#     accept: "Да"
#     cancel: "Отмена"

# === СТРОКОВЫЕ ВИДЖЕТЫ ===

# Простая строка
demo_string:
  description: "Текстовое поле (str)"
  info: "просто строка"
  default: "Пример текста"

# Многострочный текст
demo_text:
  widget: text
  description: "Многострочный текст (text)"
  info: "textarea которая вам не нужна"
  default: "Это многострочный текст\nс переносами строк"
  rows: 4

# === ЧИСЛОВЫЕ ВИДЖЕТЫ ===

# Целое число
demo_int:
  widget: int
  description: "Целое число (int)"
  info: "Виджет для ввода целых чисел с валидацией"
  default: 42

# Число с плавающей точкой
demo_float:
  widget: float
  description: "Число с плавающей точкой (float)"
  info: "Виджет для ввода дробных чисел с валидацией"
  default: 3.141592

# === СПИСКИ ===

# Простой список
demo_list:
  widget: list
  description: "Выпадающий список (list)"
  info: "Виджет для выбора из списка опций"
  source: ["Опция 1", "Опция 2", "Опция 3", "Опция 4"]

# Множественный выбор
demo_multiselect:
  widget: list
  description: "Множественный выбор (list + multiselect)"
  info: "Виджет для выбора нескольких опций"
  source: ["Элемент 1", "Элемент 2", "Элемент 3", "Элемент 4", "Элемент 5"]
  multiselect: true

# === IP АДРЕСА ===

# IP адрес
demo_ip:
  widget: ip
  description: "IP адрес (ip)"
  info: "Виджет для ввода IP адреса с автоформатированием"

# IP маска
demo_ip_mask:
  widget: ip_mask
  description: "IP маска (ip_mask)"
  info: "Виджет для ввода IP адреса с маской"
  default: "192.168.0.1/12"

# === ДАТА И ВРЕМЯ ===

# Дата и время
demo_datetime:
  widget: datetime
  description: "Дата и время (datetime)"
  info: "Виджет для выбора даты и времени"

# === ТАБЛИЦЫ ===

# Таблица (статичная, только просмотр)
demo_table:
  widget: table
  description: "Таблица (table) — справочная, только просмотр"
  info: "Статичная таблица без редактирования"
  headers: ["Имя", "Возраст", "Город"]
  data: [["Иван", "25", "Москва"], ["Мария", "30", "СПб"], ["Петр", "35", "Казань"]]
  readonly: true

# Таблица (редактируемая пользователем)
demo_table_editable:
  widget: table
  description: "Таблица (table) — редактируемая"
  info: "Пользователь может изменять значения в ячейках"
  headers: ["Параметр", "Значение"]
  data: [["timeout", "30"], ["retries", "3"]]
  # редактируемая по умолчанию (readonly не указан)

# === КНОПКИ ===

# Кнопка с командой
demo_button_command:
  widget: button
  description: "Кнопка с командой (button + command)"
  info: "Кнопка, выполняющая команду"

# Кнопка с переходом
demo_button_url:
  widget: button
  description: "Кнопка с переходом (button + url)"
  info: "Кнопка для перехода на другую страницу"
  url: "/page/page_2"

# Кнопка с диалогом
demo_button_dialog:
  widget: button
  description: "Кнопка с диалогом (button + dialog)"
  info: "Кнопка с подтверждением действия"
  dialog:
    title: "Подтверждение действия"
    text: "Вы уверены, что хотите выполнить это действие?"
    accept: "Да, выполнить"
    cancel: "Отмена"

# === ТОЛЬКО ДЛЯ ЧТЕНИЯ ===

# Только для чтения
demo_readonly:
  widget: str
  description: "Только для чтения (readonly)"
  info: "Поле, которое нельзя редактировать"
  readonly: true
  default: "Это значение нельзя изменить"

# Вкладка 2: простой ввод строки
tab2_simple_string:
  widget: str
  description: "Строка на второй вкладке"
  default: ""

# Целое число (readonly)
demo_int_readonly:
  widget: int
  description: "Целое число (readonly)"
  info: "Поле только для чтения"
  readonly: true
  default: 123

# Дробное число (readonly)
demo_float_readonly:
  widget: float
  description: "Дробное число (readonly)"
  info: "Поле только для чтения"
  readonly: true
  default: 2.718
